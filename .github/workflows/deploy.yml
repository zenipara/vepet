name: Build & Deploy VetCare System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install PostgreSQL client
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SUPABASE_DB_URL != ''
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Warn when SUPABASE_DB_URL is missing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SUPABASE_DB_URL == ''
        run: echo "⚠️ SUPABASE_DB_URL is not set. Skipping database migrations for this deploy."

      - name: Deploy database migrations to Supabase
        id: db_migrate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SUPABASE_DB_URL != ''
        continue-on-error: true
        run: bash scripts/deploy-supabase-db.sh

      - name: Warn when database migration fails
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.db_migrate.outcome == 'failure'
        run: echo "⚠️ Database migration failed (likely network/endpoint issue). Continuing frontend deploy to GitHub Pages."

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run type check
        working-directory: ./frontend
        run: npm run type-check || true

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build production
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GITHUB_PAGES: 'true'

      - name: Verify dist folder
        run: |
          echo "Dist folder contents:"
          ls -lah frontend/dist/
          echo "Total files:"
          find frontend/dist -type f | wc -l
          echo ""
          echo "Checking environment variables:"
          [ -z "$VITE_SUPABASE_URL" ] && echo "WARNING: VITE_SUPABASE_URL not set" || echo "✓ VITE_SUPABASE_URL is set"
          [ -z "$VITE_SUPABASE_ANON_KEY" ] && echo "WARNING: VITE_SUPABASE_ANON_KEY not set" || echo "✓ VITE_SUPABASE_ANON_KEY is set"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
