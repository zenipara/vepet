name: Build & Deploy VetCare System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run type check
        working-directory: ./frontend
        run: npm run type-check || true

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build production
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GITHUB_PAGES: 'true'

      - name: Verify dist folder
        run: |
          echo "Dist folder contents:"
          ls -lah frontend/dist/
          echo "Total files:"
          find frontend/dist -type f | wc -l
          echo ""
          echo "Checking environment variables:"
          [ -z "$VITE_SUPABASE_URL" ] && echo "WARNING: VITE_SUPABASE_URL not set" || echo "✓ VITE_SUPABASE_URL is set"
          [ -z "$VITE_SUPABASE_ANON_KEY" ] && echo "WARNING: VITE_SUPABASE_ANON_KEY not set" || echo "✓ VITE_SUPABASE_ANON_KEY is set"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
