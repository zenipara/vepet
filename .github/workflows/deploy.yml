name: Build & Deploy VetCare System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Set frontend build variables via repository secrets if needed
      VITE_API_URL: ${{ secrets.VITE_API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      # Database migrations are run separately against the chosen Postgres instance
      # (e.g., Render Managed Postgres). Remove any BaaS-specific migration steps.

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run type check
        working-directory: ./frontend
        run: npm run type-check || true

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build production
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          GITHUB_PAGES: 'true'

      - name: Verify dist folder
        run: |
          echo "Dist folder contents:"
          ls -lah frontend/dist/
          echo "Total files:"
          find frontend/dist -type f | wc -l
          echo ""
          echo "Checking environment variables:"
          [ -z "$VITE_API_URL" ] && echo "WARNING: VITE_API_URL not set" || echo "✓ VITE_API_URL is set"
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
